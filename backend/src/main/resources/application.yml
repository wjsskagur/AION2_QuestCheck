spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:3306/aion2_quest?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:aion2_user}
    password: ${DB_PASSWORD:aion2_pass}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MariaDBDialect

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/api/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: [profile_nickname, account_email]
          naver:
            client-id: ${NAVER_CLIENT_ID:}
            client-secret: ${NAVER_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/api/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope: [name, email, profile_image]
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/api/login/oauth2/code/google"
            scope: [openid, profile, email]
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET:aion2-quest-jwt-secret-key-must-be-32-characters-minimum}
    expiration-ms: 86400000
  character:
    max-per-account: 16
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: claude-haiku-4-5-20251001
  crawler:
    schedule: "0 0 */3 * * *"
    notice-url: https://aion2.plaync.com/board/notice
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
