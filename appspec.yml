version: 0.0
os: linux
files:
  - source: backend/build/libs/quest-checker-1.0.0.jar
    destination: /opt/app/
  - source: backend/scripts/
    destination: /opt/app/scripts/
permissions:
  - object: /opt/app/scripts/
    mode: '755'
    owner: ec2-user
hooks:
  BeforeInstall:
    - location: backend/scripts/stop.sh
      timeout: 30
      runas: ec2-user
  AfterInstall:
    - location: backend/scripts/start.sh
      timeout: 90
      runas: ec2-user
  ValidateService:
    - location: backend/scripts/health_check.sh
      timeout: 60
      runas: ec2-user
