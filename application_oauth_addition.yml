# ============================================================
# application.yml 에 추가할 OAuth2 설정
# 기존 application.yml 하단에 붙여넣기
# ============================================================

spring:
  security:
    oauth2:
      client:
        registration:

          # ── 카카오 ──────────────────────────────────────────
          kakao:
            client-id: ${KAKAO_CLIENT_ID}           # SSM: /aion2/oauth/kakao/client-id
            client-secret: ${KAKAO_CLIENT_SECRET}   # SSM: /aion2/oauth/kakao/client-secret
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - account_email

          # ── 네이버 ──────────────────────────────────────────
          naver:
            client-id: ${NAVER_CLIENT_ID}           # SSM: /aion2/oauth/naver/client-id
            client-secret: ${NAVER_CLIENT_SECRET}   # SSM: /aion2/oauth/naver/client-secret
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/naver"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
              - profile_image

          # ── 구글 ────────────────────────────────────────────
          google:
            client-id: ${GOOGLE_CLIENT_ID}          # SSM: /aion2/oauth/google/client-id
            client-secret: ${GOOGLE_CLIENT_SECRET}  # SSM: /aion2/oauth/google/client-secret
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/google"
            scope:
              - openid
              - profile
              - email

        provider:
          # 카카오는 Spring이 자동 인식 못하므로 직접 지정
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          # 네이버도 직접 지정
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

          # 구글은 Spring이 자동 처리 (provider 지정 불필요)

