name: Deploy AION2 Quest Checker

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-northeast-2
  S3_DEPLOY:  aion2-deploy-artifacts
  S3_FRONT:   aion2-quest-frontend
  APP_NAME:   aion2-quest
  DG_NAME:    aion2-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 백엔드 빌드 ──────────────────────────────────────
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'corretto', cache: gradle }
      - name: Build backend
        run: |
          chmod +x backend/gradlew
          cd backend && ./gradlew clean bootJar

      # ── 프론트엔드 빌드 ──────────────────────────────────
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: frontend/package-lock.json }
      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      # ── AWS 자격증명 ─────────────────────────────────────
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── S3 프론트 배포 + CloudFront 무효화 ──────────────
      - name: Deploy frontend
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.S3_FRONT }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ env.S3_FRONT }}/index.html \
            --cache-control "no-cache,no-store"
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DIST_ID }} \
            --paths "/*"

      # ── CodeDeploy 백엔드 배포 ───────────────────────────
      - name: Deploy backend
        run: |
          aws deploy push \
            --application-name ${{ env.APP_NAME }} \
            --s3-location s3://${{ env.S3_DEPLOY }}/app.zip \
            --source .
          aws deploy create-deployment \
            --application-name ${{ env.APP_NAME }} \
            --deployment-group-name ${{ env.DG_NAME }} \
            --s3-location bucket=${{ env.S3_DEPLOY }},key=app.zip,bundleType=zip \
            --deployment-config-name CodeDeployDefault.AllAtOnce
